services:
  app:
    container_name: api-tenants
    build: .
    image: pos-ecommerce-api:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override .env's localhost — inside the compose network the db is at `db`.
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      # Run the demand-planning recompute job frequently in dev so end-to-end
      # tests don't have to wait 24h. Override per-workflow via env_file.
      DEMAND_PLANNING_RECOMPUTE_INTERVAL_SECS: "300"
      # Recompute system-wide KPI snapshots quickly in dev so the backoffice
      # analytics endpoints have data shortly after boot (prod uses ~30 min).
      ANALYTICS_RECOMPUTE_INTERVAL_SECS: "20"
      # Shared secret for /internal service-to-service calls (impersonation v2).
      # Must match the backoffice service below. Dev value — set a real one in prod.
      INTERNAL_SERVICE_SECRET: "dev-internal-service-secret-change-me"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Platform-owner backoffice. Reuses the image built by `app` but overrides the
  # entrypoint to run the api-backoffice binary directly — it must NOT run the
  # seed (the `app` service owns migrations + seeding). Listens on :8001 with
  # its own JWT_BACKOFFICE_SECRET (two-secret isolation from the tenant API).
  api-backoffice:
    container_name: api-backoffice
    image: pos-ecommerce-api:latest
    entrypoint: ["/usr/local/bin/api-backoffice"]
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      # Reach api-gateway's /internal mint endpoint (impersonation v2). The
      # service name `app` resolves on the compose network.
      API_GATEWAY_INTERNAL_URL: "http://app:8000"
      # Must match the app service's INTERNAL_SERVICE_SECRET.
      INTERNAL_SERVICE_SECRET: "dev-internal-service-secret-change-me"
    depends_on:
      db:
        condition: service_healthy
      # Wait for the tenant container to come up so migrations + seed have
      # started. Login only succeeds once the seed finishes (~seconds in dev).
      app:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  pg_data:
