services:
  app:
    container_name: api-backend
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override .env's localhost — inside the compose network the db is at `db`.
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      # Run the demand-planning recompute job frequently in dev so end-to-end
      # tests don't have to wait 24h. Override per-workflow via env_file.
      DEMAND_PLANNING_RECOMPUTE_INTERVAL_SECS: "300"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  pg_data:
